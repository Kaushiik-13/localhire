name: CI/CD - Build, Test and Deploy

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint
        continue-on-error: true

      - name: Run tests
        run: npm run test

      - name: Build application
        run: npm run build

      - name: Create deployment package
        run: |
          mkdir -p deployment
          cp -r dist deployment/
          cp -r node_modules deployment/
          cp package*.json deployment/
          cp tsconfig.json deployment/ || true
          cp nest-cli.json deployment/ || true
          cp Dockerfile deployment/ || true
          cp docker-compose.yml deployment/ || true
          tar -czf deployment.tar.gz deployment/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: deployment.tar.gz

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: deployment-package
          path: ${{ github.workspace }}

      - name: Cleanup old files on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: rm -f ~/deployment.tar.gz

      - name: Copy artifact to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: deployment.tar.gz
          target: /home/${{ secrets.EC2_USERNAME }}/

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          envs: MONGO_USER,MONGO_PASSWORD,MONGO_DB,JWT_SECRET,RESEND_API_KEY,SMTP_FROM_EMAIL
          script: |
            # Clean up Docker space first
            docker system prune -af --volumes || true

            # Clean up old deployment
            rm -rf ~/localhire-deploy

            # Extract new deployment
            mkdir -p ~/localhire-deploy
            tar -xzf ~/deployment.tar.gz -C ~/localhire-deploy
            cd ~/localhire-deploy/deployment

            # Write environment variables
            echo "MONGO_USER=$MONGO_USER" > .env
            echo "MONGO_PASSWORD=$MONGO_PASSWORD" >> .env
            echo "MONGO_DB=$MONGO_DB" >> .env
            echo "JWT_SECRET=$JWT_SECRET" >> .env
            echo "RESEND_API_KEY=$RESEND_API_KEY" >> .env
            echo "SMTP_FROM_EMAIL=$SMTP_FROM_EMAIL" >> .env

            # Build and start the application
            docker compose up -d --build
            docker image prune -f

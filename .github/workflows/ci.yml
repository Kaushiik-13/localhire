name: CI/CD - Build, Test and Deploy

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint
        continue-on-error: true

      - name: Run tests
        run: npm run test

      - name: Build application
        run: npm run build

      - name: Build Docker image
        run: docker build -t localhire-api:${{ github.sha }} .

      - name: Test Docker image
        run: |
          docker run -d --name test-app -e MONGODB_URI=mongodb://localhost:27017 localhire-api:${{ github.sha }}
          sleep 10
          docker logs test-app
          docker stop test-app || true

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        env:
          MONGO_USER: ${{ secrets.MONGO_USER }}
          MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
          MONGO_DB: ${{ secrets.MONGO_DB }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SMTP_FROM_EMAIL: ${{ secrets.SMTP_FROM_EMAIL }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: MONGO_USER,MONGO_PASSWORD,MONGO_DB,JWT_SECRET,RESEND_API_KEY,SMTP_FROM_EMAIL
          script: |
            if [ ! -d "$HOME/localhire" ]; then
              echo "Directory not found. Cloning repository..."
              git clone https://github.com/Kaushiik-13/localhire.git ~/localhire
            fi
            cd ~/localhire
            git pull origin master
            echo "MONGO_USER=$MONGO_USER" > .env
            echo "MONGO_PASSWORD=$MONGO_PASSWORD" >> .env
            echo "MONGO_DB=$MONGO_DB" >> .env
            echo "JWT_SECRET=$JWT_SECRET" >> .env
            echo "RESEND_API_KEY=$RESEND_API_KEY" >> .env
            echo "SMTP_FROM_EMAIL=$SMTP_FROM_EMAIL" >> .env
            docker compose up -d --build
            docker image prune -f
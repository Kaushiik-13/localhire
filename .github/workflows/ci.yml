name: CI - Build and Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint
        continue-on-error: true

      - name: Run tests
        run: npm run test

      - name: Build application
        run: npm run build

      - name: Build Docker image
        run: docker build -t localhire-api:${{ github.sha }} .

      - name: Test Docker image
        run: |
          docker run -d --name test-app -e MONGODB_URI=mongodb://localhost:27017 localhire-api:${{ github.sha }}
          sleep 10
          docker logs test-app
          docker stop test-app || true
